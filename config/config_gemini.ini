[Crawler]
# --- Configuration for the YouTube Brand Crawler ---
search_terms = Samsung Galaxy S25
search_modifiers = review, opiniao, opinião, problemas, experiencia, vale a pena, vs, smartphone
exclude_keywords = anuncio, commercial, ad, sponsored
min_view_count = 5000
sort_by = relevance
max_results = 100

[AudioExtractor]
# --- Configuration for the Audio Extractor ---
audio_folder_name = audio

[Analysis]
# --- Configuration for the Gemini-Powered Analysis ---

# Model for the final, high-level synthesis.
pro_model_name = gemini-2.5-pro

# Lighter model for summarizing individual batches.
flash_model_name = gemini-2.5-flash

# Path to the prompt for the final report synthesis (Gemini Pro).
pro_prompt_template_path = config/gemini_analysis_prompt.txt

# Path to the prompt for summarizing batches (Gemini Flash).
flash_prompt_template_path = config/gemini_flash_prompt.txt

# Path to the HTML template for the final report.
report_template_path = config/strategic_report_template.html

# Number of videos to process in a single batch.
batch_size = 5

# Directory to store intermediate analysis summaries.
cache_dir = outputs/cache

# The format for the final report. Options: html, markdown
report_format = html

# Path to the specific comments CSV file to analyze.
# This is now read automatically based on the brand name.
# comments_csv_path = outputs/Volkswagen_Tera/Volkswagen_Tera_raw_comments.csv